<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

    <style>
        /* Custom Navy Styles */
        .bg-navy { background-color: #001E44; }

        .btn-navy {
            background-color: #001E44;
            border-color: #001E44;
            color: #ffffff;
        }
    </style>

    <title>Login - Nittany Auction</title>
</head>
<body class="bg-light">

<!-- Header Section -->
<div class="header-section bg-navy text-center text-white">
    <div class="container">
        <h1 class="display-4 font-weight-bold">Nittany Auction</h1>
        <p class="lead">Welcome! Please log in to your account.</p>
    </div>
</div>


<!-- Login Portals -->

<div class="container">
    <div class="card-body text-center">
        <h3 class="card-title text-dark">User Login</h3>
        <p class="card-text text-muted">For Bidders</p>

        <form action="/login_bidder" method="POST">
            <div class="form-group">
                <input type="email" name="user_email" class="form-control" placeholder="Email Address (User ID)" required>
            </div>
            <div class="form-group">
                <input type="password" name="user_password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-navy btn-block">Login</button>
        </form>
        <hr class="mt-4 mb-3">
        <small>Don't have an account? <a href="/register">Register here</a></small>
        </div>
</div>



<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"
        integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
        integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"
        integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
        crossorigin="anonymous"></script>
</body>
</html>
